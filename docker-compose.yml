# Production compose: builds both images and wires them together.
#
# Usage:
#   docker compose up --build        # first run
#   docker compose up -d             # subsequent starts
#   docker compose logs -f frontend  # tail logs
#
# The backend's pb_data is persisted in a named Docker volume so SQLite
# survives image rebuilds.  To wipe the database:
#   docker compose down -v

services:
  pdf-service:
    build:
      context: .
      dockerfile: pdf-service/Dockerfile
    environment:
      - POCKETBASE_URL=http://backend:8090
    restart: unless-stopped
    # Internal only — no host port exposure needed.

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      # Override models here if needed:
      # - GEMINI_MODEL=gemini-2.5-flash-preview-04-17
      # - GROQ_MODEL=llama-3.3-70b-versatile
    restart: unless-stopped
    # Internal only — no host port exposure needed.

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      # Named volume keeps the SQLite file and uploads across rebuilds.
      - pb_data:/app/pb_data
    environment:
      - OCR_SERVICE_URL=http://ocr-service:8001
      - PDF_SERVICE_URL=http://pdf-service:3002
    depends_on:
      - ocr-service
      - pdf-service
    restart: unless-stopped
    # No ports exposed to the host — the frontend nginx proxies /api to here.
    # To access the PocketBase admin UI directly during debugging, temporarily
    # add:  ports: ["8090:8090"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pb_data:
