server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Forward all /api/* requests to the PocketBase backend container.
    # The service is named "backend" in docker-compose.yml.
    #
    # proxy_buffering off + X-Accel-Buffering: no are required for the
    # PocketBase realtime SSE stream — nginx buffers SSE by default which
    # breaks the live-sync feature.
    location /api/ {
        proxy_pass http://backend:8090;
        proxy_http_version 1.1;

        # Pass the original Host so PocketBase CORS checks match.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / long-poll: disable buffering so events flow through immediately.
        proxy_buffering          off;
        proxy_cache              off;
        add_header X-Accel-Buffering no;

        # Keep long-lived connections alive (realtime SSE).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # PDF export goes directly to the pdf-service, bypassing PocketBase.
    # The pdf-service validates the auth token itself against the backend.
    # client_max_body_size must be generous — the payload includes a
    # base64-encoded JPEG (plan image) which can reach 20-30 MB.
    location /pdf/ {
        proxy_pass http://pdf-service:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 60m;
        proxy_read_timeout 120s;
    }

    # SPA fallback: any path that is not a static file returns index.html
    # so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
