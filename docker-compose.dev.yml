# Development compose: hot-reload Vite frontend + containerised PocketBase.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# The frontend Vite dev server runs on http://localhost:5173 with full HMR.
# It proxies /api/* to the backend container via the API_TARGET env var
# (see vite.config.ts).
#
# pb_data is bind-mounted from ./server/pb_data so you can inspect or reset
# the SQLite file from the host without running docker exec.
# pb_migrations is also bind-mounted so migration file edits take effect on
# the next server restart without rebuilding the image.

services:
  pdf-service:
    build:
      # Context is the repo root so the Dockerfile can copy src/pdf/ and
      # src/types/ alongside the pdf-service/ entrypoint.
      context: .
      dockerfile: pdf-service/Dockerfile
    environment:
      - POCKETBASE_URL=http://backend:8090
    ports:
      - "3002:3002"
    restart: unless-stopped

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      # Expose for direct testing: curl http://localhost:8001/parse
      - "8001:8001"
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server/pb_data:/app/pb_data
      - ./server/pb_migrations:/app/pb_migrations
    environment:
      - OCR_SERVICE_URL=http://ocr-service:8001
      - PDF_SERVICE_URL=http://pdf-service:3002
    depends_on:
      - ocr-service
      - pdf-service
    ports:
      # Expose to host so you can reach the PocketBase admin UI at
      # http://localhost:8090/_/ during development.
      - "8090:8090"
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      # Isolate node_modules inside the container — prevents the container
      # from using binaries compiled for the host OS.
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - API_TARGET=http://backend:8090
      - PDF_TARGET=http://pdf-service:3002
    command: npm run dev
    depends_on:
      - backend
