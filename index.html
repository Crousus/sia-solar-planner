<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='28' font-size='28'%3E%E2%98%80%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Solar Planner · precision PV layout</title>

    <!--
      Fonts for the "Command Console" aesthetic (Raycast-inspired):
        - Geist: the workhorse AND the display face. Body, labels, buttons,
          nav at 400–600, and hero headlines at 700–800 with negative
          tracking (see `.font-hero` in index.css). One unified family
          keeps the chrome coherent.
        - JetBrains Mono: technical/numeric readouts (kWp, counts, FIG_##
          labels, keyboard hints). Kept because the app's data IS the
          content and tabular mono figures do the heavy lifting.
      An earlier iteration pulled in Instrument Serif italic for hero
      headlines; dropped because the serif-italic read as ornamental
      against the otherwise technical UI voice. Removing the extra
      stylesheet also shaves a font request on first paint.
      Preconnect so the TLS handshake overlaps HTML parse. display=swap
      keeps first paint usable on cold connections.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
